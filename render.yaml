databases:
  - name: ashuresumemaker-db
    plan: free
    databaseName: ashuresumemaker
    user: ashuresumemaker

services:
  - type: web
    name: ashuresumemaker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.prod
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: ashuresumemaker-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
